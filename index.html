<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Bonola | Data Analyst</title>
    <style>
        /* Estilos generales para quitar márgenes y poner la tipografía */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #ffffff; /* Fondo blanco */
        }

        /* Contenedor del fondo dinámico */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1; /* Se queda al fondo */
        }

        /* Contenedor de tu texto, centrado por encima de las partículas */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2; /* Se pone por encima del fondo */
            text-align: center;
            max-width: 800px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8); /* Un fondo levemente transparente para leer bien */
            border-radius: 10px;
        }

        h1 {
            font-size: 3em;
            color: #333;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Aquí va el fondo de partículas -->
    <div id="particles-js"></div>

    <!-- Aquí va tu información -->
    <div class="content">
        <h1>Kevin Bonola</h1>
        <p>I'm a Chemical Engineer and Data Analyst who loves turning messy operational data into clear, actionable dashboards. From managing hazardous chemical inventories to optimizing international workflows, my goal is to help global teams make smarter, safer, and more sustainable decisions.</p>
    </div>

    <!-- Scripts para cargar la librería de Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        /* Configuración para simular la red neuronal/nodos conectados */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#aaaaaa" }, /* Color de los puntos (gris) */
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#cccccc", /* Color de las líneas */
                    "opacity": 0.4,
                    "width": 1
                },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }, /* Se conectan al ratón al pasar por encima */
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
